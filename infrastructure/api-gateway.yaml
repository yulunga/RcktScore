http_api:
  name: rcktscore-http-api
  stage: prod
  routes:
    - method: POST
      path: /start_match
      integration: StartMatchFunction
    - method: GET
      path: /get_score/{match_id}
      integration: GetMatchFunction
    - method: POST
      path: /score_point
      integration: ScorePointFunction
    - method: POST
      path: /event_action
      integration: EventActionFunction
    - method: POST
      path: /undo_action
      integration: UndoActionFunction
  auth:
    current_mode: api_key_or_public
    next_mode: cognito_jwt

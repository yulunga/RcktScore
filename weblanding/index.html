<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hit N Score | Racket Sports Scoring</title>
    <meta
      name="description"
      content="HitNScore is a new racket sports scoring platform, starting with squash and expanding across the court."
    />
    <link rel="icon" href="./assets/icons/favicon.ico?v=20260513-2" sizes="any" />
    <link rel="stylesheet" href="./assets/css/styles.css?v=20260513-2" />
  </head>
  <body>
    <div class="page-shell">
      <header class="topbar hero-card">
        <div class="brand-lockup" aria-label="Hit N Score">
          <img
            class="brand-lockup__logo"
            src="./assets/images/brand-logo.png?v=20260513-2"
            alt="Hit N Score logo"
          />
          <div class="brand-lockup__stack">
            <div class="wordmark" aria-hidden="true">
              <span class="wordmark__hit">Hit</span><span class="wordmark__n">n</span><span class="wordmark__score">Score</span>

            <p class="eyebrow eyebrow--subtle">Racket sports scoring platform</p>
          </div>
        </div>
        <a class="login-btn" href="https://app.hitnscore.com">Beta Access</a>

      <main class="content">
        <section class="hero hero-card">
          <div class="hero__copy">
            <p class="tag">Coming to the court soon</p>
            <h1>Scoring for squash first. Tennis next.</h1>
            <p class="lead">
              HitNScore is being shaped for squash, tennis, padel, pickleball,
              badminton, and table tennis.
            </p>
          </div>
        </section>

        <div class="landing-help-link">
          <a href="./help.html?v=20260513-2">Need Help?</a>
        </div>
      </main>

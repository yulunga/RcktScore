AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: RcktScore v2 HTTP API and Lambda backend.

Globals:
  Function:
    Runtime: python3.12
    Timeout: 15
    MemorySize: 256
    CodeUri: .
    Environment:
      Variables:
        SUPABASE_DB_URL: !Ref SupabaseDbUrl

Parameters:
  SupabaseDbUrl:
    Type: String
    NoEcho: true
  StageName:
    Type: String
    Default: prod
  InterestToEmail:
    Type: String
    Default: rcktinterest@ucingo.com
  InterestFromEmail:
    Type: String
    Default: rcktinterest@ucingo.com
  FeedbackToEmail:
    Type: String
    Default: rcktinterest@ucingo.com
  FeedbackFromEmail:
    Type: String
    Default: rcktinterest@ucingo.com
  UserInvitationFromEmail:
    Type: String
    Default: rcktinterest@ucingo.com
  UserApprovalBaseUrl:
    Type: String
    Default: ""

Resources:
  RcktScoreHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref StageName
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowHeaders:
          - Content-Type
          - x-api-key
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS

  StartMatchFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: functions/create_match/handler.lambda_handler
      Events:
        StartMatch:
          Type: HttpApi
          Properties:
            ApiId: !Ref RcktScoreHttpApi
            Path: /start_match
            Method: POST

  StartScheduledMatchFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: functions/start_scheduled_match/handler.lambda_handler
      Events:
        StartScheduledMatch:
          Type: HttpApi
          Properties:
            ApiId: !Ref RcktScoreHttpApi
            Path: /start_scheduled_match
            Method: POST

  LoginFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: functions/login/handler.lambda_handler
      Events:
        Login:
          Type: HttpApi
          Properties:
            ApiId: !Ref RcktScoreHttpApi
            Path: /login
            Method: POST

  ApproveOrgUserFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: functions/approve_org_user/handler.lambda_handler
      Events:
        ApproveOrgUser:
          Type: HttpApi
          Properties:
            ApiId: !Ref RcktScoreHttpApi
            Path: /organization_users/approve
            Method: GET

  RootAdminLoginFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: functions/root_admin_login/handler.lambda_handler
      Events:
        RootAdminLogin:
          Type: HttpApi
          Properties:
            ApiId: !Ref RcktScoreHttpApi
            Path: /root_admin/login
            Method: POST

  GetRootAdminDashboardFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: functions/get_root_admin_dashboard/handler.lambda_handler
      Events:
        GetRootAdminDashboard:
          Type: HttpApi
          Properties:
            ApiId: !Ref RcktScoreHttpApi
            Path: /root_admin/dashboard
            Method: GET

  CreateRootAdminOrganizationFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: functions/create_root_admin_organization/handler.lambda_handler
      Events:
        CreateRootAdminOrganization:
          Type: HttpApi
          Properties:
            ApiId: !Ref RcktScoreHttpApi
            Path: /root_admin/organizations
            Method: POST

  SearchRootAdminOrganizationsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: functions/search_root_admin_organizations/handler.lambda_handler
      Events:
        SearchRootAdminOrganizations:
          Type: HttpApi
          Properties:
            ApiId: !Ref RcktScoreHttpApi
            Path: /root_admin/organizations/search
            Method: GET

  CreateRootAdminOrgUserFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: functions/create_root_admin_org_user/handler.lambda_handler
      Environment:
        Variables:
          USER_INVITATION_FROM_EMAIL: !Ref UserInvitationFromEmail
          USER_APPROVAL_BASE_URL: !Ref UserApprovalBaseUrl
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              Resource: "*"
      Events:
        CreateRootAdminOrgUser:
          Type: HttpApi
          Properties:
            ApiId: !Ref RcktScoreHttpApi
            Path: /root_admin/organization_users
            Method: POST

  UpdateRootAdminOrgUserFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: functions/update_root_admin_org_user/handler.lambda_handler
      Events:
        UpdateRootAdminOrgUser:
          Type: HttpApi
          Properties:
            ApiId: !Ref RcktScoreHttpApi
            Path: /root_admin/organization_users/{user_id}
            Method: PUT

  RegisterInterestFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: functions/register_interest/handler.lambda_handler
      Environment:
        Variables:
          INTEREST_TO_EMAIL: !Ref InterestToEmail
          INTEREST_FROM_EMAIL: !Ref InterestFromEmail
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              Resource: "*"
      Events:
        RegisterInterest:
          Type: HttpApi
          Properties:
            ApiId: !Ref RcktScoreHttpApi
            Path: /register_interest
            Method: POST

  SendFeedbackFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: functions/send_feedback/handler.lambda_handler
      Environment:
        Variables:
          FEEDBACK_TO_EMAIL: !Ref FeedbackToEmail
          FEEDBACK_FROM_EMAIL: !Ref FeedbackFromEmail
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              Resource: "*"
      Events:
        SendFeedback:
          Type: HttpApi
          Properties:
            ApiId: !Ref RcktScoreHttpApi
            Path: /feedback
            Method: POST

  GetMatchFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: functions/get_match/handler.lambda_handler
      Events:
        GetScore:
          Type: HttpApi
          Properties:
            ApiId: !Ref RcktScoreHttpApi
            Path: /get_score/{match_id}
            Method: GET

  GetDashboardFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: functions/get_dashboard/handler.lambda_handler
      Events:
        GetDashboard:
          Type: HttpApi
          Properties:
            ApiId: !Ref RcktScoreHttpApi
            Path: /dashboard/{organization_id}
            Method: GET

  GetOrganizationSettingsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: functions/get_organization_settings/handler.lambda_handler
      Events:
        GetOrganizationSettings:
          Type: HttpApi
          Properties:
            ApiId: !Ref RcktScoreHttpApi
            Path: /organization_settings/{organization_id}
            Method: GET

  SearchMatchSetupLookupFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: functions/search_match_setup_lookup/handler.lambda_handler
      Events:
        SearchMatchSetupLookup:
          Type: HttpApi
          Properties:
            ApiId: !Ref RcktScoreHttpApi
            Path: /match_setup_lookup/{organization_id}
            Method: GET

  UpdateOrganizationDetailsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: functions/update_organization_details/handler.lambda_handler
      Events:
        UpdateOrganizationDetails:
          Type: HttpApi
          Properties:
            ApiId: !Ref RcktScoreHttpApi
            Path: /organization_details/{organization_id}
            Method: PUT

  CreateOrgUserFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: functions/create_org_user/handler.lambda_handler
      Environment:
        Variables:
          USER_INVITATION_FROM_EMAIL: !Ref UserInvitationFromEmail
          USER_APPROVAL_BASE_URL: !Ref UserApprovalBaseUrl
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              Resource: "*"
      Events:
        CreateOrgUser:
          Type: HttpApi
          Properties:
            ApiId: !Ref RcktScoreHttpApi
            Path: /organization_users
            Method: POST

  UpdateOrgUserFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: functions/update_org_user/handler.lambda_handler
      Events:
        UpdateOrgUser:
          Type: HttpApi
          Properties:
            ApiId: !Ref RcktScoreHttpApi
            Path: /organization_users/{user_id}
            Method: PUT

  CreateCourtFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: functions/create_court/handler.lambda_handler
      Events:
        CreateCourt:
          Type: HttpApi
          Properties:
            ApiId: !Ref RcktScoreHttpApi
            Path: /organization_courts
            Method: POST

  UpdateCourtFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: functions/update_court/handler.lambda_handler
      Events:
        UpdateCourt:
          Type: HttpApi
          Properties:
            ApiId: !Ref RcktScoreHttpApi
            Path: /organization_courts/{court_id}
            Method: PUT

  DeleteCourtFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: functions/delete_court/handler.lambda_handler
      Events:
        DeleteCourt:
          Type: HttpApi
          Properties:
            ApiId: !Ref RcktScoreHttpApi
            Path: /organization_courts/{court_id}
            Method: DELETE

  ScorePointFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: functions/score_point/handler.lambda_handler
      Events:
        ScorePoint:
          Type: HttpApi
          Properties:
            ApiId: !Ref RcktScoreHttpApi
            Path: /score_point
            Method: POST

  EventActionFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: functions/event_action/handler.lambda_handler
      Events:
        EventAction:
          Type: HttpApi
          Properties:
            ApiId: !Ref RcktScoreHttpApi
            Path: /event_action
            Method: POST

  UndoActionFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: functions/undo_action/handler.lambda_handler
      Events:
        UndoAction:
          Type: HttpApi
          Properties:
            ApiId: !Ref RcktScoreHttpApi
            Path: /undo_action
            Method: POST

  EndMatchFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: functions/end_match/handler.lambda_handler
      Events:
        EndMatch:
          Type: HttpApi
          Properties:
            ApiId: !Ref RcktScoreHttpApi
            Path: /end_match
            Method: POST

  WebsocketBroadcastFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: functions/websocket_broadcast/handler.lambda_handler

Outputs:
  HttpApiUrl:
    Description: Base URL for the RcktScore HTTP API
    Value: !Sub "https://${RcktScoreHttpApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}"

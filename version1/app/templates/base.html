<!DOCTYPE html>
<html lang="en">
<head>
  <title>{% block title %}SkwshScore{% endblock %}</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" sizes="32x32" href="{{ url_for('static', filename='images/SkwshLogo.ico') }}" type="image/x-icon">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/SqScore.css') }}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body data-logout-url="{{ url_for('auth.logout') }}">
  <div class="skwshScoreLayout">
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
      <div class="container-fluid">
        <a class="navbar-brand" href="{{ url_for('main.index') }}">SkwshScore</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
          aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link {% if request.path == url_for('main.index') %}active{% endif %}" href="{{ url_for('main.index') }}">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.path == '/game/new-game' %}active{% endif %}" href="/game/new-game">New Game</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.path == '/game/read-games' %}active{% endif %}" href="/game/read-games">Current Games</a>
          </li>
          <!--
          <li class="nav-item">
            <a class="nav-link {% if request.path == '/scoreboard' %}active{% endif %}" href="/scoreboard">Scoreboard</a>
          </li> -->
            <li class="nav-item">
              <a class="nav-link {% if request.path == '/settings' %}active{% endif %}" href="/settings">Settings</a>
            </li>
          <!-- Dropdown --
            <li class="nav-item dropdown">
              <a class="nav-link dropdown-toggle" href="#" id="gamesDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                Games
              </a>
              <ul class="dropdown-menu" aria-labelledby="gamesDropdown">
                <li><a class="dropdown-item" href="#">Action</a></li>
                <li><a class="dropdown-item" href="#">Another action</a></li>
                <li><a class="dropdown-item" href="#">Something else</a></li>
              </ul>
            </li> -->
          </ul>
        
        <!-- Logout Button on the Right -->
          <div class="menu-user">{{ current_user.username }}</div>
          <form class="d-flex" action="{{ url_for('auth.logout') }}" method="get">
            <button class="btn btn-warning" type="submit">Logout</button>
          </form>
        </div>
      </div>
    </nav>

    <!-- main class="container mt-4 vh-90" -->
    <main class="containerMain">
      {% block content %}
      {% endblock %}
    </main>

    <footer class="footer bg-light text-center py-1 mt-auto">
      {% block footer %} 
        <small>&copy; 2025 SkwshScore. All rights reserved.</small>
      {% endblock %}
    </footer>
  </div>

<!-- Modal HTML for client inactivity countdown-->
<div class="modal fade" id="timeoutModal" tabindex="-1" aria-labelledby="timeoutModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Session Timeout Warning</h5>
      </div>
      <div class="modal-body">
        <p>Your session will expire in <span id="timeoutCountdown">60</span> seconds due to inactivity.</p>
      </div>
      <div class="modal-footer">
        <button id="stayLoggedInBtn" class="btn btn-primary" data-bs-dismiss="modal">Stay Logged In</button>
      </div>
    </div>
  </div>
</div>
<script src="{{ url_for('static', filename='js/base-template.js') }}"></script>
</body>
</html>

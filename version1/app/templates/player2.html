<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Player 2 Scoreboard</title>
</head>
<body>
    <h1>Player 2 Scoreboard</h1>
    <h2>{{ player2 }}: {{ player2_score }}</h2>
    <form method="POST" action="{{ url_for('add_point', player='player2') }}">
        <input type="submit" value="+1">
    </form>
    <br>
    <form method="POST" action="{{ url_for('toggle_serve', player='player2') }}">
        <input type="submit" value="Toggle Serve">
    </form>
    <br>
    <form method="POST" action="{{ url_for('toggle_side', player='player2') }}">
        <input type="submit" value="Toggle Side">
    </form>
    <br>
    <a href="{{ url_for('scoreboard') }}">Scoreboard</a>
</body>
</html>

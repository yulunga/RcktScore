{% extends "base.html" %}
{% block content %}
{% include 'settings_menu.html' %}

    <div class="container-fluid pt-4 ps-6">
        <h2>🏢 Club Details</h2>
        <form method="post">
            <div class="mb-3">
                <label class="form-label">Club Name</label>
                <input type="text" name="organization_name" class="form-control" value="{{ settings.organization_name or '' }}" readonly>
            </div>
            <div class="mb-3">
                <label class="form-label">Address</label>
                <textarea name="org_address" class="form-control">{{ settings.org_address or '' }}</textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">Contact Name</label>
                <input type="text" name="org_contact" class="form-control" value="{{ settings.org_contact or '' }}">
            </div>
            <div class="mb-3">
                <label class="form-label">Telephone</label>
                <input type="text" name="org_telephone" class="form-control" value="{{ settings.org_telephone or '' }}">
            </div>
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="org_email" class="form-control" value="{{ settings.org_email or '' }}">
            </div>
            <div class="mb-3">
                <label class="form-label">Website</label>
                <input type="url" name="org_webaddress" class="form-control" value="{{ settings.org_webaddress or '' }}">
            </div>
            <button type="submit" class="btn btn-primary">Save</button>
        </form>
</div>
{% endblock %}

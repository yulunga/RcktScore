{% extends "base.html" %}
{% block content %}
{% include 'settings_menu.html' %}

<div class="container-fluid pt-4 ps-6">
    <h2>👥 Manage Users</h2>
    <button class="btn btn-success mb-3" data-bs-toggle="modal" data-bs-target="#addUserModal">➕ Add User</button>

    <table class="table table-bordered">
        <thead>
            <tr>
                <th>Username</th>
                <th>Role</th>
                <th>Created</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for user in users %}
            <tr>
                <td>{{ user.clubusername }}</td>
                <td>{{ user.role }}</td>
                <td>{{ user.created_at }}</td>
                <td>
                    <a href="{{ url_for('settings.edit_user', user_id=user.id) }}" class="btn btn-sm btn-primary">Edit</a>
                    <a href="{{ url_for('settings.reset_password', user_id=user.id) }}" class="btn btn-sm btn-warning">Reset Password</a>
                    <a href="{{ url_for('settings.delete_user', user_id=user.id) }}" class="btn btn-sm btn-danger"
                        onclick="return confirm('Are you sure you want to delete this user?');">Delete</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

<!-- Add User Modal -->
<div class="modal fade" id="addUserModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
    <form method="POST" action="{{ url_for('settings.add_user') }}">
        <div class="modal-content">
        <div class="modal-header">
            <h5 class="modal-title">Add New User</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
            <div class="mb-3">
                <label>Username</label>
                <input name="username" type="text" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Password</label>
                <input name="password" type="password" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Role</label>
                <select name="role" class="form-select">
                    <option value="admin">Admin</option>
                    <option value="scorer">Scorer</option>
                    <option value="read-only">Read-only</option>
                </select>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-success">Create</button>
        </div>
    </div>
    </form>
</div>
</div>
{% endblock %}

<!DOCTYPE html>
<html>
<head>
  <title>{% block title %}{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/SqScore.css') }}">
</head>

<body>
  <section class="layout">
    <div class="navbar">
      <div class="navbar-left">
        <h1>Welcome</h1>
        <div class="menu">
            <a href="{{ url_for('main.home') }}">Home</a>
          <a href="/game/new-game">New Game</a>
          <a href="/game/read-games">Current Games</a>
          <a href="/scoreboard">Scoreboard</a>
          <a href="#">Settings</a>
          <div class="dropdown">
            <a href="#" id="gamesDropdown" class="dropdown-toggle">Games ▼</a>
            <div class="dropdown-content" id="dropdownMenu">
              <a href="#">Action</a>
              <a href="#">Another action</a>
              <a href="#">Something else</a>
            </div>
          </div>
        </div>
      </div>
      <button class="logout-btn" onclick="window.location.href='/auth/logout'">Logout</button>
    </div>
    <main>
      <div class="main">
        {% block content %}
        {% endblock %}
      </div>
    </main>
    <div class="footer">   

    </div>
  </section>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ENjdO4Dr2bkBIFxQpeoTz1HIcje39Wm4jDKdf19U8gI4ddQ3GYNS7NTKfAdVQSZe" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.7/dist/umd/popper.min.js" integrity="sha384-zYPOMqeu1DAVkHiLqWBUTcbYfZ8osu1Nd6Z89ify25QV9guujx43ITvfi12/QExE" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.min.js" integrity="sha384-Y4oOpwW3duJdCWv5ly8SCFYWqFDsfob/3GkgExXKV4idmbt98QcxXYs9UoXAB7BZ" crossorigin="anonymous"></script>

    <script>
      $(function () {
        $('#gamesDropdown').on('click', function (e) {
          e.preventDefault();
          $('#dropdownMenu').fadeToggle(200);
        });
  
        $(document).on('click', function (e) {
          if (!$(e.target).closest('.dropdown').length) {
            $('#dropdownMenu').fadeOut(200);
          }
        });
      });
    </script>
  </body>
</html>

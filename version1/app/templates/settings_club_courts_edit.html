{% extends "base.html" %}
{% block content %}
<div class="container-fluid pt-4 ps-5">
    <h2>Courts  </h2>

    <form method="POST" class="row g-3 mb-4">
        <div class="col-md-5">
            <input type="text" name="name" class="form-control" placeholder="Court Name" required>
        </div>
        <div class="col-md-5">
            <input type="text" name="alias" class="form-control" placeholder="Court Alias (optional)">
        </div>
        <div class="col-md-2">
            <button type="submit" class="btn btn-primary">Add Court</button>
        </div>
    </form>

    <table class="table table-bordered">
        <thead>
            <tr>
                <th>Court Name</th>
                <th>Alias</th>
                <th style="width: 120px;">Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for court in courts %}
            <tr>
                <td>{{ court.name }}</td>
                <td>{{ court.alias or '' }}</td>
                <td>
                    <a href="{{ url_for('settings.edit_court', court_id=court.id) }}" class="btn btn-sm btn-secondary">Edit</a>
                    <form method="POST" action="{{ url_for('settings.delete_court', court_id=court.id) }}" style="display:inline-block" onsubmit="return confirm('Delete this court?')">
                        <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
